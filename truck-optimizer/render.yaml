services:
  - type: web
    name: truck-capacity-optimizer
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENV
        value: live
    # Persistent disk keeps store.json alive across redeploys
    # Remove the disk section below if you are on Render's free plan
    disk:
      name: truck-optimizer-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
