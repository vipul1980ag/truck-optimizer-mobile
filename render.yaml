services:
  - type: web
    name: truck-capacity-optimizer
    env: node
    rootDir: truck-optimizer
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENV
        value: live
